<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Command Center</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🚀 Career Command Center</h1>

        <input type="text" id="searchBox" placeholder="Search Company...">
    </header>

    <section class="profile">

    <h2>👤 My Profile</h2>

    <div class="profile-card">

        <p><strong>Name:</strong> Divyanshu</p>

        <p>
            <strong>Primary Email:</strong>
            tdivyanshu846@gmail.com
        </p>

        <p>
            <strong>Course:</strong>
            MCA
        </p>

    </div>

</section>

    <section class="add-company">

        <h2>Add Company</h2>

        <input type="text" id="companyName" placeholder="Company Name">

        <input type="url" id="companyLink" placeholder="Portal Link">

        <input type="email" id="companyEmail" placeholder="Registered Email" value="tdivyanshu846@gmail.com">

        <button onclick="addCompany()">
            Add Company
        </button>

    </section>

    <section class="add-company">

    <h2>🔐 Account Vault</h2>

    <input
    type="text"
    id="accountTitle"
    placeholder="Account Name">

    <input
    type="email"
    id="accountEmail"
    placeholder="Email">

    <input
    type="text"
    id="accountUsername"
    placeholder="Username">

    <input
    type="text"
    id="accountHint"
    placeholder="Password Hint">

    <button onclick="addAccount()">
        Save Account
    </button>

</section>

<section id="accountContainer"></section>

    <section id="companyContainer">

        <div class="card"
            onclick="window.open('https://nextstep.tcsapps.com/indiacampus/#/home/track-my-application','_blank')">

            <h3>TCS</h3>

            <p>📧 Your Registered Email</p>

            <span class="status assessment">
                🟡 Assessment
            </span>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
