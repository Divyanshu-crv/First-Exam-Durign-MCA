<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Command Center</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🚀 Career Command Center</h1>

        <input
            type="text"
            id="searchBox"
            placeholder="Search Company...">
    </header>

    <!-- Dashboard -->

    <section class="stats">

        <div class="stat-card">
            <h3 id="totalCompanies">0</h3>
            <p>Total Companies</p>
        </div>

        <div class="stat-card">
            <h3 id="appliedCount">0</h3>
            <p>🔵 Applied</p>
        </div>

        <div class="stat-card">
            <h3 id="assessmentCount">0</h3>
            <p>🟡 Assessment</p>
        </div>

        <div class="stat-card">
            <h3 id="selectedCount">0</h3>
            <p>🟢 Selected</p>
        </div>

    </section>

    <!-- Profile -->

    <section class="profile">

        <h2>👤 My Profile</h2>

        <div class="profile-card">

            <p>
                <strong>Name:</strong>
                Divyanshu
            </p>

            <p>
                <strong>Primary Email:</strong>
                td8
            </p>

            <p>
                <strong>Course:</strong>
                MCA
            </p>

        </div>

    </section>

    <!-- Add Company -->

    <section class="add-company">

        <h2>🏢 Add Company</h2>

        <input
            type="text"
            id="companyName"
            placeholder="Company Name">

        <input
            type="url"
            id="companyLink"
            placeholder="Portal Link">

        <input
            type="email"
            id="companyEmail"
            placeholder="Registered Email"
            value="tdivyanshu846@gmail.com">

        <select id="companyStatus">

            <option>🔵 Applied</option>
            <option>🟡 Assessment</option>
            <option>🟠 Interview</option>
            <option>🟢 Selected</option>
            <option>🔴 Rejected</option>

        </select>

        <button onclick="addCompany()">
            Add Company
        </button>

    </section>

    <!-- Account Vault -->

    <section class="add-company">

        <h2>🔐 Account Vault</h2>

        <input
            type="text"
            id="accountTitle"
            placeholder="Company / Website Name">

        <input
            type="email"
            id="accountEmail"
            placeholder="Email Used">

        <input
            type="text"
            id="accountUsername"
            placeholder="Username">

        <input
            type="text"
            id="accountHint"
            placeholder="Password Hint">

        <button onclick="addAccount()">
            Save Account
        </button>

    </section>

    <section id="accountContainer"></section>

    <!-- Notes Vault -->

    <section class="add-company">

        <h2>📝 Notes Vault</h2>

        <input
            type="text"
            id="noteTitle"
            placeholder="Note Title">

        <textarea
            id="noteText"
            placeholder="Write your note here..."></textarea>

        <button onclick="addNote()">
            Save Note
        </button>

    </section>

    <section id="noteContainer"></section>

    <!-- Company Cards -->

    <section id="companyContainer"></section>

    <script src="script.js"></script>

</body>

</html>
